services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=medplum
      - POSTGRES_PASSWORD=medplum
    volumes:
      - medplum-postgres-data:/var/lib/postgresql/data
    command: ['postgres', '-c', 'listen_addresses=*', '-c', 'statement_timeout=60000', '-c', 'default_transaction_isolation=REPEATABLE READ', '-c', 'shared_preload_libraries=pg_stat_statements,auto_explain']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U medplum']
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --requirepass medplum
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'medplum', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
  medplum-server:
    # Pinned to the version the smoke test was run against (SMOKE_TEST.md). Bump deliberately, not via :latest.
    image: medplum/medplum-server:5.1.21
    restart: unless-stopped
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    ports:
      - '8103:8103'
    command: ['env']
    environment:
      MEDPLUM_PORT: 8103
      MEDPLUM_BASE_URL: 'http://localhost:8103/'
      MEDPLUM_APP_BASE_URL: 'http://localhost:3000/'
      MEDPLUM_STORAGE_BASE_URL: 'http://localhost:8103/storage/'
      MEDPLUM_DATABASE_HOST: 'postgres'
      MEDPLUM_DATABASE_PORT: 5432
      MEDPLUM_DATABASE_DBNAME: 'medplum'
      MEDPLUM_DATABASE_USERNAME: 'medplum'
      MEDPLUM_DATABASE_PASSWORD: 'medplum'
      MEDPLUM_REDIS_HOST: 'redis'
      MEDPLUM_REDIS_PORT: 6379
      MEDPLUM_REDIS_PASSWORD: 'medplum'
      MEDPLUM_BINARY_STORAGE: 'file:./binary/'
      MEDPLUM_ALLOWED_ORIGINS: '*'
      MEDPLUM_MAX_JSON_SIZE: '5mb'
      MEDPLUM_MAX_BATCH_SIZE: '50mb'
      MEDPLUM_MCP_ENABLED: 'true'
      MEDPLUM_INTROSPECTION_ENABLED: 'true'
      # raise the rate limit so the eval agents' many FHIR retrieval calls don't get 429'd
      MEDPLUM_DEFAULT_RATE_LIMIT: '6000000'
      MEDPLUM_DEFAULT_AUTH_RATE_LIMIT: '600000'
      MEDPLUM_SHUTDOWN_TIMEOUT_MILLISECONDS: 30000
    healthcheck:
      test: ['CMD', 'node', '-e', 'fetch("http://localhost:8103/healthcheck").then(r => r.json()).then(console.log).catch(() => { process.exit(1); })']
      interval: 15s
      timeout: 10s
      retries: 20
volumes:
  medplum-postgres-data:
