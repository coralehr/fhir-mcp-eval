<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">A0 prime overflow-stratum decomposition</title>
  <desc id="desc">Blueprint-style stacked bar decomposing 262 A0-overflow questions into A0 prime correct, residual overflow, and fit-but-wrong categories, with sandbox and query-aware ceiling markers.</desc>
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111111"/>
      <stop offset="1" stop-color="#17120f"/>
    </linearGradient>
    <pattern id="minorGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#fff3eb" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>
  <style>
    .bg{fill:url(#panel)}
    .frame{fill:url(#minorGrid);stroke:#fff3eb;stroke-opacity:.12}
    .title,.num,.label{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#ededed}
    .sub,.legend{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#8f887f}
    .title{font-size:23px;font-weight:700}
    .sub{font-size:12px}
    .label{font-size:13px;font-weight:700}
    .num{font-size:15px;font-weight:700}
    .ok{fill:#ff7a3d}
    .overflow{fill:#ff6b5a}
    .wrong{fill:#ffb15c}
    .marker{stroke:#5cc8a0;stroke-width:2;stroke-dasharray:6 5}
    .marker2{stroke:#ededed;stroke-width:2;stroke-dasharray:6 5}
  </style>
  <rect class="bg" width="960" height="390"/>
  <rect class="frame" x="34" y="34" width="892" height="322"/>
  <text class="title" x="58" y="72">WHY BLUNT PROJECTION ONLY RECOVERS A THIRD</text>
  <text class="sub" x="58" y="98">A0' on the 262 questions where raw FHIR overflowed.</text>

  <g>
    <rect class="ok" x="100" y="150" width="168.4" height="64"/>
    <rect class="overflow" x="268.4" y="150" width="281.4" height="64"/>
    <rect class="wrong" x="549.8" y="150" width="310.2" height="64"/>
    <rect x="100" y="150" width="760" height="64" fill="none" stroke="#fff3eb" stroke-opacity=".38"/>
  </g>

  <g text-anchor="middle">
    <text class="num" x="184.2" y="176">58 correct</text>
    <text class="sub" x="184.2" y="195">22.1%</text>
    <text class="num" x="409.1" y="176">97 still overflow</text>
    <text class="sub" x="409.1" y="195">37.0%</text>
    <text class="num" x="704.9" y="176">107 fit but wrong</text>
    <text class="sub" x="704.9" y="195">40.8%</text>
  </g>

  <line class="marker" x1="598.6" y1="126" x2="598.6" y2="235"/>
  <circle cx="598.6" cy="150" r="8" fill="#5cc8a0" opacity=".28" filter="url(#glow)"/>
  <rect x="594.6" y="146" width="8" height="8" fill="#5cc8a0"/>
  <text class="label" x="506" y="122" fill="#5cc8a0">A5 sandbox 65.6%</text>

  <line class="marker2" x1="613.8" y1="126" x2="613.8" y2="258"/>
  <circle cx="613.8" cy="214" r="8" fill="#ededed" opacity=".18" filter="url(#glow)"/>
  <rect x="609.8" y="210" width="8" height="8" fill="#ededed"/>
  <text class="label" x="632" y="254">query-aware upper bound 67.6%</text>

  <g class="legend" font-size="13">
    <rect class="ok" x="120" y="286" width="14" height="14"/>
    <text x="144" y="298">correct under blunt projection</text>
    <rect class="overflow" x="120" y="314" width="14" height="14"/>
    <text x="144" y="326">residual multi-turn overflow</text>
    <rect class="wrong" x="500" y="286" width="14" height="14"/>
    <text x="524" y="298">fit, but selection dropped what mattered</text>
  </g>
  <text class="sub" x="500" y="326">Next: date windows plus first-and-last values.</text>
</svg>
