<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">A0, A0 prime, and A5 accuracy by stratum</title>
  <desc id="desc">Blueprint-style grouped bar chart showing overflow, resource-real, and pooled accuracy for raw FHIR, blunt projection, and code sandbox arms.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111111"/>
      <stop offset="1" stop-color="#17120f"/>
    </linearGradient>
    <pattern id="minorGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#fff3eb" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>
  <style>
    .bg{fill:url(#panel)}
    .grid{stroke:#fff3eb;stroke-opacity:.08;stroke-width:1}
    .axis{stroke:#fff3eb;stroke-opacity:.34;stroke-width:1.5}
    .tick,.sub,.legend{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#8f887f}
    .title,.num,.label{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#ededed}
    .title{font-size:23px;font-weight:700}
    .sub{font-size:12px}
    .tick{font-size:12px}
    .label{font-size:14px;font-weight:700}
    .num{font-size:13px;font-weight:700}
    .raw{fill:#9a948c}
    .proj{fill:#ff7a3d}
    .code{fill:#5cc8a0}
  </style>
  <rect class="bg" x="0" y="0" width="960" height="520"/>
  <rect x="34" y="34" width="892" height="452" fill="url(#minorGrid)" stroke="#fff3eb" stroke-opacity=".12"/>
  <text class="title" x="58" y="72">FINAL THREE-ARM CONTROL</text>
  <text class="sub" x="58" y="98">Accuracy by stratum, trustworthy grading. Higher is better.</text>

  <g class="legend" font-size="13">
    <rect class="raw" x="610" y="58" width="16" height="16"/>
    <text x="634" y="71">A0 raw</text>
    <rect class="proj" x="704" y="58" width="16" height="16"/>
    <text x="728" y="71">A0' projection</text>
    <rect class="code" x="610" y="84" width="16" height="16"/>
    <text x="634" y="97">A5 sandbox</text>
  </g>

  <g>
    <line class="grid" x1="110" y1="380" x2="850" y2="380"/>
    <line class="grid" x1="110" y1="317.5" x2="850" y2="317.5"/>
    <line class="grid" x1="110" y1="255" x2="850" y2="255"/>
    <line class="grid" x1="110" y1="192.5" x2="850" y2="192.5"/>
    <line class="grid" x1="110" y1="130" x2="850" y2="130"/>
    <line class="axis" x1="110" y1="130" x2="110" y2="380"/>
    <line class="axis" x1="110" y1="380" x2="850" y2="380"/>
    <text class="tick" x="74" y="384">0%</text>
    <text class="tick" x="68" y="321.5">20%</text>
    <text class="tick" x="68" y="259">40%</text>
    <text class="tick" x="68" y="196.5">60%</text>
    <text class="tick" x="68" y="134">80%</text>
  </g>

  <g text-anchor="middle">
    <rect class="raw" x="176" y="380.0" width="36" height="0.0"/>
    <rect class="proj" x="222" y="310.9" width="36" height="69.1"/>
    <rect class="code" x="268" y="175.0" width="36" height="205.0"/>
    <text class="num" x="194" y="402">0.0</text>
    <text class="num" x="240" y="302">22.1</text>
    <text class="num" x="286" y="165">65.6</text>
    <text class="label" x="240" y="426">Overflow</text>
    <text class="sub" x="240" y="448">n=262</text>

    <rect class="raw" x="436" y="159.1" width="36" height="220.9"/>
    <rect class="proj" x="482" y="160.9" width="36" height="219.1"/>
    <rect class="code" x="528" y="178.1" width="36" height="201.9"/>
    <text class="num" x="454" y="149">70.7</text>
    <text class="num" x="500" y="151">70.1</text>
    <text class="num" x="546" y="168">64.6</text>
    <text class="label" x="500" y="426">Resource-real</text>
    <text class="sub" x="500" y="448">n=147</text>

    <rect class="raw" x="696" y="300.6" width="36" height="79.4"/>
    <rect class="proj" x="742" y="256.9" width="36" height="123.1"/>
    <rect class="code" x="788" y="175.9" width="36" height="204.1"/>
    <text class="num" x="714" y="291">25.4</text>
    <text class="num" x="760" y="247">39.4</text>
    <text class="num" x="806" y="166">65.3</text>
    <text class="label" x="760" y="426">Pooled</text>
    <text class="sub" x="760" y="448">n=409</text>
  </g>

  <rect x="58" y="470" width="6" height="6" fill="#ff7a3d"/>
  <text class="sub" x="74" y="477">Resource-real sanity check: projection ties raw; sandbox is slightly worse.</text>
</svg>
